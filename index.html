<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DACE Clan Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      color: gold;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
    }

    .title {
      font-size: 18px;
      color: gold;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: left;
    }

    th {
      color: gold;
    }

    tr:nth-child(even) {
      background: #141414;
    }
  </style>
</head>
<body>

<header>DACE Clan Dashboard</header>

<div class="container">

  <div class="card">
    <div class="title">Clan Stats</div>
    <p>Rank: #32</p>
    <p>Total Points: 1,234,567</p>
  </div>

  <div class="card">
    <div class="title">Members</div>
    <table>
      <tr>
        <th>Name</th>
        <th>Total</th>
        <th>5m</th>
        <th>30m</th>
      </tr>
      <tr>
        <td>Aaron</td>
        <td>120,000</td>
        <td>+500</td>
        <td>+2,000</td>
      </tr>
      <tr>
        <td>Player2</td>
        <td>98,000</td>
        <td>+300</td>
        <td>+1,200</td>
      </tr>
    </table>
  </div>

</div>

</body>
</html>
