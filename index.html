<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DACE Clan Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #080808;
      color: #fff;
    }

    header {
      background: linear-gradient(90deg, #111, #1c1c1c);
      padding: 25px;
      text-align: center;
      border-bottom: 2px solid gold;
    }

    header h1 {
      margin: 0;
      color: gold;
      font-size: 38px;
    }

    header p {
      margin: 8px 0 0;
      color: #aaa;
    }

    .container {
      max-width: 1250px;
      margin: auto;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .card {
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.12);
    }

    .card-title {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .card-value {
      color: gold;
      font-size: 28px;
      font-weight: bold;
    }

    .table-wrap {
      overflow-x: auto;
      background: #111;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th {
      background: #1f1f1f;
      color: gold;
      padding: 12px;
      text-align: left;
      position: sticky;
      top: 0;
    }

    td {
      padding: 11px 12px;
      border-bottom: 1px solid #222;
    }

    tr:hover {
      background: #1a1a1a;
    }

    .rank {
      color: gold;
      font-weight: bold;
    }

    .role {
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .officer {
      background: rgba(255, 215, 0, 0.2);
      color: gold;
    }

    .member {
      background: rgba(255, 255, 255, 0.12);
      color: #ddd;
    }

    .gain5 {
      background: rgba(255, 215, 0, 0.18);
      color: gold;
      font-weight: bold;
    }

    .updated {
      margin-top: 12px;
      color: #888;
      font-size: 13px;
      text-align: right;
    }

    .loading {
      text-align: center;
      color: gold;
      font-size: 20px;
      padding: 40px;
    }
  </style>
</head>

<body>
  <header>
    <h1>DACE Clan Dashboard</h1>
    <p>DACE ON TOP 🔥</p>
  </header>

  <div class="container">
    <div class="cards">
      <div class="card">
        <div class="card-title">Total Members</div>
        <div class="card-value" id="memberCount">--</div>
      </div>

      <div class="card">
        <div class="card-title">Clan Total Points</div>
        <div class="card-value" id="clanTotal">--</div>
      </div>

      <div class="card">
        <div class="card-title">Top Player</div>
        <div class="card-value" id="topPlayer">--</div>
      </div>

      <div class="card">
        <div class="card-title">Last Refresh</div>
        <div class="card-value" id="lastRefresh">--</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Username</th>
            <th>Role</th>
            <th>5m</th>
            <th>30m</th>
            <th>1h</th>
            <th>12h</th>
            <th>24h</th>
            <th>Current Total</th>
          </tr>
        </thead>
        <tbody id="leaderboard">
          <tr>
            <td colspan="9" class="loading">Loading DACE data...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="updated" id="updatedText"></div>
  </div>

  <script>
  const sheetUrl = "https://docs.google.com/spreadsheets/d/1nLVjTQJ7_6mZw1T0Gde459xrEh99swt1PVV-raqsvgY/gviz/tq?tqx=out:csv";

  function cleanNumber(value) {
    if (!value) return 0;
    return Number(String(value).replace(/,/g, "").trim()) || 0;
  }

  function formatNumber(value) {
    return cleanNumber(value).toLocaleString();
  }

  function parseCSV(text) {
    return text
      .trim()
      .split("\n")
      .map(row =>
        row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
          .map(cell => cell.replace(/^"|"$/g, "").trim())
      );
  }

  async function loadData() {
    try {
      const response = await fetch(sheetUrl);
      const csvText = await response.text();
      const rows = parseCSV(csvText);

      const data = rows.slice(1)
        .filter(row => row[0])
        .map(row => ({
          Username: row[0],
          Role: row[1],
          "5m": row[2],
          "30m": row[3],
          "1h": row[4],
          "12h": row[5],
          "24h": row[6],
          "Last Refresh": row[7],
          "Current Total": row[8]
        }));

      data.sort((a, b) => cleanNumber(b["Current Total"]) - cleanNumber(a["Current Total"]));

      const leaderboard = document.getElementById("leaderboard");
      leaderboard.innerHTML = "";

      let clanTotal = 0;

      data.forEach((player, index) => {
        clanTotal += cleanNumber(player["Current Total"]);

        const roleClass = String(player.Role).toLowerCase() === "officer" ? "officer" : "member";

        leaderboard.innerHTML += `
          <tr>
            <td class="rank">#${index + 1}</td>
            <td>${player.Username}</td>
            <td><span class="role ${roleClass}">${player.Role}</span></td>
            <td class="gain5">${formatNumber(player["5m"])}</td>
            <td>${formatNumber(player["30m"])}</td>
            <td>${formatNumber(player["1h"])}</td>
            <td>${formatNumber(player["12h"])}</td>
            <td>${formatNumber(player["24h"])}</td>
            <td><strong>${formatNumber(player["Current Total"])}</strong></td>
          </tr>
        `;
      });

      document.getElementById("memberCount").textContent = data.length;
      document.getElementById("clanTotal").textContent = clanTotal.toLocaleString();
      document.getElementById("topPlayer").textContent = data[0]?.Username || "--";
      document.getElementById("lastRefresh").textContent = data[0]?.["Last Refresh"] || "--";
      document.getElementById("updatedText").textContent = "Data pulled from Google Sheets";

    } catch (error) {
      document.getElementById("leaderboard").innerHTML = `
        <tr>
          <td colspan="9" class="loading">Could not load sheet data.</td>
        </tr>
      `;
      console.error(error);
    }
  }

  loadData();
</script>
</body>
</html>
